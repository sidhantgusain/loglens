<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogLens — AI-Powered Error Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0d0f14;
            --surface: #161a23;
            --surface-2: #1e2333;
            --border: rgba(255,255,255,0.08);
            --border-emphasis: rgba(255,255,255,0.13);
            --text-primary: #e8eaf0;
            --text-muted: #8892a4;
            --accent-blue: #5b8af5;
            --accent-purple: #7c6af7;
            --green-success: #3dd68c;
            --amber-warning: #f5a623;
            --red-error: #f05252;
            --font-body: 'Sora', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--dark-bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        pre, code {
            font-family: var(--font-mono);
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
</body>
</html>
